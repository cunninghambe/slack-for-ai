name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/slack-ai-server

jobs:
  # ─── Lint & Type Check ─────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run ESLint
        working-directory: server
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: server
        run: npm run format:check

      - name: TypeScript type check
        working-directory: server
        run: npm run typecheck

  # ─── Unit & Integration Tests ──────────────────────────────
  test:
    name: Unit & Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_slack_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npx vitest run
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_slack_ai

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-${{ github.sha }}
          path: server/coverage/
          retention-days: 14

  # ─── Security Scan ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run npm audit
        working-directory: server
        run: npm audit --production --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          for pattern in 'password\s*=\s*["\x27][^"\x27]+["\x27]' 'apiKey\s*=\s*["\x27][^"\x27]+["\x27]' 'secret\s*=\s*["\x27][^"\x27]+["\x27]'; do
            if grep -rn "$pattern" server/src/ 2>/dev/null; then
              echo "WARNING: Potentially hardcoded secret found matching: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No hardcoded secrets detected."
          fi

  # ─── Build ─────────────────────────────────────────────────
  build:
    name: Build Verification
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: slack-ai-server:test

      - name: Save build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.platform }}
          path: server/

  # ─── Create Release Tag (main only) ────────────────────────
  release:
    name: Create Release
    if: github.ref == 'refs/heads/main'
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version server/package.json)" >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}-${{ github.sha }}"
          if ! git tag -l | grep -q "$TAG"; then
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ─── Deploy to Staging ─────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push staging image
        env:
          REGISTRY: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "Building staging image: ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}"
          # Placeholder: Replace with actual registry push
          # docker buildx build --push -t $REGISTRY/$IMAGE_NAME:staging-${{ github.sha }} ./server

      - name: Deploy to staging
        id: deploy
        run: |
          echo "Deploying to staging environment..."
          # Replace with actual deployment mechanism:
          # - kubectl apply -f k8s/staging/
          # - docker compose up -d (for simple deployments)
          # - SSH + deploy script
          echo "url=http://staging.slack-ai.internal:3200" >> "$GITHUB_OUTPUT"

      - name: Run health check
        run: |
          echo "Waiting for staging to be healthy..."
          # sleep 15
          # curl -f --max-time 30 http://staging.slack-ai.internal:3200/api/health || exit 1
          echo "Staging health check passed"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f --max-time 10 ${{ steps.deploy.outputs.url }}/health | jq -e '.status == "ok"'
          echo "Smoke tests passed"

  # ─── Deploy to Production ──────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build, security-scan, release]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: |
          echo "Building production image: ${{ env.IMAGE_NAME }}:latest"
          # docker buildx build --push -t $REGISTRY/$IMAGE_NAME:latest ./server
          # docker buildx build --push -t $REGISTRY/$IMAGE_NAME:$(git rev-parse --short HEAD) ./server

      - name: Deploy to production (blue-green)
        run: |
          echo "Deploying to production with blue-green strategy..."
          echo "1. Deploy new version to green slot"
          echo "2. Run health checks against green"
          echo "3. Switch traffic from blue to green"
          echo "4. Monitor for 5 minutes"
          echo "5. If health good, complete"
          echo "6. If health bad, rollback to blue"
          # Actual implementation:
          # kubectl set image deployment/slack-ai-server \
          #   slack-ai-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify production deployment
        run: |
          echo "Verifying production deployment..."
          # Sleep for rollout
          # sleep 30
          # curl -f --max-time 30 https://api.slack-ai.com/health
          # curl -f --max-time 10 https://api.slack-ai.com/api/channels
          echo "Production deployment verified"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment status notification"
          # Send to Slack/Discord/PagerDuty:
          # curl -X POST $SLACK_WEBHOOK_URL -d '{"text": "Production deployed: ${{ github.sha }}"}'

  # ─── Rollback Job ──────────────────────────────────────────
  rollback:
    name: Rollback (Manual Trigger)
    if: github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.environment, 'rollback')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Get previous release tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "none")
          echo "Rolling back to: $PREVIOUS_TAG"
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Execute rollback
        run: |
          echo "Rolling back to previous stable version..."
          # kubectl rollout undo deployment/slack-ai-server
          # kubectl rollout status deployment/slack-ai-server

      - name: Verify rollback
        run: |
          echo "Verifying rollback..."
          # curl -f --max-time 30 https://api.slack-ai.com/health
          echo "Rollback verified successfully"
