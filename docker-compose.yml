# ─── Slack-for-AI Platform Docker Compose ─────────────────────
# Usage:
#   docker compose up -d          (staging/dev with hot-reload)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d  (production)

services:
  # ─── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slack-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-slackai}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
      POSTGRES_DB: ${PGDATABASE:-slack_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-slackai} -d ${PGDATABASE:-slack_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - slack-ai-network

  # ─── Application Server ────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
      target: development
    container_name: slack-ai-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${PGUSER:-slackai}:${PGPASSWORD:-changeme}@postgres:5432/${PGDATABASE:-slack_ai}
      PORT: 3200
      WS_PORT: 3200
    ports:
      - "${SERVER_PORT:-3200}:3200"
    volumes:
      - ./server/src:/app/src:cached
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - slack-ai-network

volumes:
  postgres_data:
    driver: local

networks:
  slack-ai-network:
    driver: bridge
